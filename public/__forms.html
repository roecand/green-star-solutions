<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify form detection</title>
  </head>
  <body>
    <!--
      Netlify's build bot scans static HTML files for forms to provision.
      Framework-rendered forms (Next.js export) are not reliably detected, so
      this plain file is the source of truth. Field names must match the
      FormData keys in components/ProjectForm.tsx.
    -->
    <form name="strategy-call" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="strategy-call" />
      <input name="bot-field" />
      <input name="business" />
      <input name="trade" />
      <input name="service_area" />
      <input name="current_site" />
      <input name="goals" />
      <textarea name="goal_notes"></textarea>
      <input name="current_marketing" />
      <input name="ad_budget" />
      <input name="name" />
      <input type="email" name="email" />
      <input name="phone" />
      <input name="best_time" />
    </form>
  </body>
</html>
